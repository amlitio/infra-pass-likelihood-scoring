services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      APP_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/infra_scoring
      APP_ENV: production
      APP_SESSION_COOKIE_SECURE: "false"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "scripts/smoke_check.py"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: infra_scoring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d infra_scoring"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
