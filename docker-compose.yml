services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      APP_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/infra_scoring
      APP_ENV: production
    depends_on:
      - db

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: infra_scoring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
